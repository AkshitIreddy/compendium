  "view-traces", "filter-traces-in-application", "manage-trace", "export-traces",
  "trace-query-syntax", "query-threads", "threads", "run-data-format", "feedback-data-format",
  # Monitoring (3)
  "dashboards", "alerts", "insights",
]

[license]
id = "mit-langchain"
text = """Documentation content (c) LangChain, from docs.langchain.com, used under the
MIT License (source repository: github.com/langchain-ai/docs). Processed content
(chunked, embedded) is a modified form of the original pages."""
attribution_html = """Framework documentation © <a href="https://docs.langchain.com">LangChain</a>, MIT License (<a href="https://github.com/langchain-ai/docs">source</a>). Content snapshot; processed and chunked for retrieval."""
document_note = "Documentation (c) LangChain, MIT License, from docs.langchain.com (snapshot; may lag the live docs)."

[embedding]
model = "embed-v4.0"
dims = 1024
input_type = "search_document"

[index]
connectivity = 24
expansion_add = 384
expansion_search = 192
quantization = "f16"
recall_gate = 0.98
