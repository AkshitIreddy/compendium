name: Docs drift watch

# The framework-docs pack is scoped by allowlists against docs.langchain.com,
# which has reorganized before (and will again). Monthly, compare the live
# sitemap against the recipe's allowlists and open an issue when pages
# disappear or counts drift beyond the pack's own ±10% guardrail — the same
# check the build pipeline enforces, run as an early warning.
on:
  schedule:
    - cron: "0 6 3 * *" # 06:00 UTC, 3rd of each month
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare sitemap against the recipe allowlists
        id: drift
        run: |
          python - <<'EOF' | tee drift.txt
          import tomllib, urllib.request, xml.etree.ElementTree as ET, os

          raw = tomllib.load(open("pipeline/packs/framework-docs/recipe.toml", "rb"))
          src = raw["source"]
          base = src["base_url"].rstrip("/")

          req = urllib.request.Request(f"{base}/sitemap.xml",
              headers={"User-Agent": "compendium-docs-drift-watch"})
          tree = ET.fromstring(urllib.request.urlopen(req, timeout=60).read())
          ns = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          urls = {u.text.strip() for u in tree.findall(".//sm:loc", ns) if u.text}

          matched = sorted(u for u in urls
              if any(u.startswith(base + p) for p in src.get("url_prefixes", [])))
          missing = [s for s in src.get("exact_slugs", [])
              if f"{base}{src.get('exact_slug_prefix','')}{s}" not in urls]
          total = len(matched) + len(src.get("exact_slugs", [])) - len(missing)
          expected = int(src.get("expected_pages", 0))
          drifted = missing or (expected and abs(total - expected) > expected * 0.10)

          print(f"expected={expected} found={total} missing_slugs={len(missing)}")
          if missing:
              print("missing:", ", ".join(missing[:20]))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"drifted={'true' if drifted else 'false'}\n")
          EOF
      - name: Open an issue on drift
        if: steps.drift.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "framework-docs pack: docs.langchain.com has drifted" \
            --body "$(printf 'The monthly sitemap check found drift against the framework-docs allowlists — the docs likely reorganized. Review the allowlist in pipeline/packs/framework-docs/recipe.toml and rebuild the pack (see docs/CONTRIBUTING.md, refresh runbook).\n\n```\n%s\n```' "$(cat drift.txt)")" \
            --label "packs"
