name: Release

# Tag a version (v0.2.0) and this builds the NSIS installer on a clean
# Windows runner — packs come from the newest packs-* release — and attaches
# it to a draft GitHub release for manual review + publish.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - name: Download knowledge packs (newest packs-* release)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --json tagName --jq '[.[] | select(.tagName | startswith("packs-"))][0].tagName')
          test -n "$tag" || { echo "no packs-* release found"; exit 1; }
          echo "using packs from $tag"
          mkdir -p packs-out
          gh release download "$tag" --pattern "*.pack" --dir packs-out
          ls -la packs-out
      - run: npm ci
        working-directory: app
      - name: Build installer
        working-directory: app
        run: npm run tauri build
      - name: Attach installer to a draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          exe=$(ls app/src-tauri/target/release/bundle/nsis/*.exe)
          gh release create "${GITHUB_REF_NAME}" --draft --generate-notes --title "Compendium ${GITHUB_REF_NAME}" "$exe" ||
          gh release upload "${GITHUB_REF_NAME}" "$exe" --clobber
