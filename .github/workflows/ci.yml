name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: UI — typecheck, contrast matrix, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: WCAG contrast matrix + unit tests
        run: npx vitest run
      - name: Production build
        run: npm run build

  engine:
    name: Engine — cargo check (all targets)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      # tauri-build validates frontendDist at compile time; give it a stub
      - name: Stub frontend dist
        shell: bash
        run: mkdir -p app/dist && echo "<html></html>" > app/dist/index.html
      - name: cargo check (lib, bins, tests)
        working-directory: app/src-tauri
        run: cargo check --all-targets

  engine-tests:
    name: Engine — offline tests against real packs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - name: Stub frontend dist
        shell: bash
        run: mkdir -p app/dist && echo "<html></html>" > app/dist/index.html
      - name: Download knowledge packs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p packs-out
          gh release download packs-2026.07.0 --pattern "*.pack" --dir packs-out
          ls -la packs-out
      # Live-API tests are #[ignore]d; everything else runs offline.
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test

  pipeline:
    name: Pipeline — syntax + recipe sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile the package
        run: python -m compileall -q pipeline/compendium_pack
      - name: Recipes parse and declare required license fields
        run: |
          python - <<'EOF'
          import tomllib, pathlib, sys
          failures = []
          for recipe in pathlib.Path("pipeline/packs").glob("*/recipe.toml"):
              raw = tomllib.load(open(recipe, "rb"))
              for key in ("id", "text", "attribution_html", "document_note"):
                  if not raw.get("license", {}).get(key, "").strip():
                      failures.append(f"{recipe}: license.{key} missing")
              for key in ("id", "version", "name", "description", "source_type"):
                  if not str(raw.get("pack", {}).get(key, "")).strip():
                      failures.append(f"{recipe}: pack.{key} missing")
          if failures:
              print("\n".join(failures)); sys.exit(1)
          print("all recipes valid")
          EOF
